; XIAO ESP32-S3 MSP bridge (sim2real branch B, docs/SIM2REAL.md).
;   pio run -e xiao_bridge -t upload && pio device monitor
; Pre-solder smoke test (WiFi join + UDP LED toggle, no FC needed):
;   pio run -e blink_test -t upload && pio device monitor
[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:xiao_bridge]
build_src_filter = +<main.cpp>
; VL53L1X ToF (CJMCU-531 breakout) on the stock I2C pins — optional at runtime, the bridge
; boots and proxies without it.
lib_deps = pololu/VL53L1X @ ^1.3.1

[env:blink_test]
build_src_filter = +<blink_test.cpp>

; UART wiring probe: pairs with Betaflight CLI `serialpassthrough uart1 115200`.
[env:uart_probe]
build_src_filter = +<uart_probe.cpp>
