# Capacity probe: the giant-range scale-generalist with a WIDER [256,256] net (was [128,128]).
# Motivation (flywheel dawn-hill-4820): training the [128,128] net on the full 4.5->18 m range lifted
# big/giant but COST tight (0.906->0.844) — a capacity bottleneck (one small net can't hold both ends
# of the scale range at once). This run adds capacity to test whether a bigger policy holds
# tight>=0.90 AND the big/giant gains simultaneously (clean GREEN), or whether the tradeoff is
# fundamental. Geometry + DR + budget identical to gate_race_general_giant; only hidden_sizes change.
# Deployability caveat: [256,256] (~70k params) exceeds the ~19k [128,128] MCU target — research probe.

run:
  name: gate_race_general_giant_w256

task:
  name: gate_race
  n_gates: 5
  episode_len: 900
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001
  scale_randomize: true
  scale_radius_min: 4.5
  scale_radius_max: 18.0
  scale_step_ratio_min: 0.34
  scale_step_ratio_max: 0.62
  scale_z_max_min: 2.3
  scale_z_max_max: 3.5
  bound_xy: 22.0
  bound_z_min: 0.15
  bound_z_max: 6.0

env:
  n_envs: 4096
  seed: 0

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

whoop: {}

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [256, 256]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
