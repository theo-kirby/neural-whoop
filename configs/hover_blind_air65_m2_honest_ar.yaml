# hover_blind_air65_m2_honest_ar: the M2 eval config with the honest noise AR(1)-COLORED (rho
# 0.9 attitude / 0.8 gyro -- modeled, unvalidated). The white M2 (_m2_honest) is the conservative
# worst-case-spectrum bound; this is the spectrum-honest counterpart. Not a training arm; run
# with survival_probe.py --dr. Bar >= 80%. obs_stack 3 matches the R-ladder arms.
run:
  name: hover_blind_air65_m2_honest_ar

task:
  name: hover_blind
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.0
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.8
  z_max: 2.2
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0

env:
  n_envs: 2048
  seed: 0
  obs_stack: 3

dr:
  enabled: true
  wind_accel_mps2: 1.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.0       # trim calibrated: the honesty split (see header)
  obs_noise_std: 0.0
  #                        [roll,  pitch, p,    q,    r   ]  (rad, rad/s)
  obs_noise_std_channels: [0.02,  0.02,  2.5,  2.2,  1.5]
  obs_noise_ar_channels:  [0.9,   0.9,   0.8,  0.8,  0.8]   # AR(1) rho -- MODELED, unvalidated
  obs_bias_channels:      [0.0,   0.0,   0.05, 0.05, 0.05]
  action_latency_steps: 5
  impulse_prob: 0.02
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]
