# hover_blind_air65_d50: gyro-noise amplitude DOSE-RESPONSE arm at 0.5x the measured floor.
# The R-ladder (R1/R3/R4, 2026-07-06) closed RED with a clean attribution: the honest gyro-noise
# AMPLITUDE itself (white 2.5/2.2/1.5 rad/s sd) makes the open-loop thrust trim unlearnable. But
# that amplitude was measured FROM FRAME VIBRATION at 50 Hz sampling (docs/SIM2REAL.md) — it is
# aliased mechanical vibration, not intrinsic sensor error, so it is REDUCIBLE IN SOFTWARE with
# zero new hardware: the ESP32 bridge can poll MSP_RAW_IMU at ~200 Hz (median RTT 2.41 ms measured
# on the bench) and box-average 4 samples per 50 Hz policy step -> sd/2 if inter-sample independent.
# This arm asks: is HALF the measured amplitude below the learnability ceiling sigma*?
#
# Fork of hover_blind_air65_r1.yaml changing ONE factor: gyro obs noise sd 2.5/2.2/1.5 -> 1.25/1.1/0.75.
# Attitude noise (0.02) and gyro bias (0.05, not vibration — averaging cannot remove DC) unchanged.
# Bars: M1 (--no-dr) >= 91.6%; M2 at the TRAINED amplitude (m2_honest_d50, --dr) >= 80%.
# Honesty flags: 200 Hz polling and 5 ms inter-sample independence of the vibration noise are
# MODELED/unvalidated until bench-measured on the deploy box.

run:
  name: hover_blind_air65_d50

task:
  name: hover_blind
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.0
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.8
  z_max: 2.2
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0

env:
  n_envs: 8192
  seed: 0
  obs_stack: 3

dr:
  enabled: true
  wind_accel_mps2: 1.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.05      # tight: deployment calibrates hover throttle on the bench
  obs_noise_std: 0.0           # superseded by the per-channel list below
  #                        [roll,  pitch, p,     q,    r    ]  (rad, rad/s)
  obs_noise_std_channels: [0.02,  0.02,  1.25,  1.1,  0.75]
  obs_bias_channels:      [0.0,   0.0,   0.05,  0.05, 0.05]
  action_latency_steps: 5
  impulse_prob: 0.02
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]

ppo:
  total_steps: 3_200_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [64, 64]
  activation: tanh
  init_log_std: -0.5
  dr_curriculum_frac: 0.5
  ckpt_interval_updates: 800
