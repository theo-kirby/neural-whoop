# Hop-11 (Flywheel) — *** NO-GO experiment, retained as the reproducible recipe ***
# DR-on RELIABILITY hardening via a RELIABILITY-WEIGHTED REWARD: baseline [128,128]@120M (full DR)
# plus a per-step near-miss penalty that ramps 0->boundary_penalty as the drone enters the last
# boundary_margin m before any crash bound (band 0.4 m, below the lowest gate -> normal flight
# untouched).
# RESULT (3 seeds, eval 2048x1500 seed 12345): SAFER but SLOWER, and the primary metric did not
# move — DR-off crash 1.7e-4 -> 6.4e-5 (~2.6x fewer) and DR-off completion 0.919 -> 0.959, but
# DR-on completion 0.804 -> 0.808 (FLAT) while best_lap rose ~8.5% DR-off / ~10% DR-on (violates the
# <=5% speed guardrail). Fails the GREEN bar -> NOT promoted. Insight: DR-on non-completion is not
# simply crash-limited (it's also timeouts/missed-gates under latency+wind), so a safety penalty
# cannot close it. Flywheel hop-11 node. boundary_penalty stays default 0.0 in the codebase; this
# file is the reproduction recipe only — do NOT use as a baseline.

run:
  name: gate_race_relreward

task:
  name: gate_race
  n_gates: 5
  episode_len: 600
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001
  boundary_penalty: 1.0     # hop-11: per-step near-miss penalty (max per-axis, reached at the bound)
  boundary_margin: 0.4      # danger band thickness (m); below the lowest gate -> normal flight untouched

env:
  n_envs: 4096
  seed: 0

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

whoop: {}

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
