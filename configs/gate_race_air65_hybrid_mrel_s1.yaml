# gate_race_air65_hybrid_mrel: compose the winners — onboard-hybrid split latency (soft-moon-6755)
# x Muon lr 2.5e-3 (black-silence-5752) x rel reliability shaping (ancient-field-0677).
# Fork of gate_race_air65_hybrid.yaml; ONLY optimizer+lr (adam 3e-4 -> muon 2.5e-3) and reward
# shaping (crash_penalty 30, hop-11 near-miss band 1.0/0.4) differ. Deploy-recipe candidate:
# does the Muon lap gain survive the ONBOARD DR regime (>=0.80 completion DR-on)? Also probes
# whether the Muon DR-on collapse (0.55-0.60 offboard) was an action-latency interaction.
# Flywheel: control tiny-grass-6642.
# gate_race re-centered for the real BetaFPV Air65 II + offboard deployment (sim2real).
# Airframe numbers are provisional best-estimates; pin them by weighing the real drone at Stage 0.

run:
  name: gate_race_air65_hybrid_mrel_s1

task:
  name: gate_race
  n_gates: 5
  episode_len: 600
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 30.0
  time_penalty: 0.05
  smoothness_penalty: 0.001
  boundary_penalty: 1.0     # hop-11 near-miss band (ramps 0->1 in the last 0.4 m before a crash bound)
  boundary_margin: 0.4

env:
  n_envs: 4096
  seed: 1

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1   # onboard actuation: local control loop (~0-20ms), not the offboard pipeline
  uplink_latency_steps: 5   # target-channel uplink: video->detect->uplink ~0-100ms at 50Hz
  uplink_interval_steps: 2  # ~25-30Hz uplink rate, zero-order-held between packets
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

# Air65 II airframe (~25-27g AUW = ~17g dry + 1S 300mAh ~8g + ~2g flow deck). Mass DR spans
# battery choice (260/300mAh) + flow-deck payload + build tolerance. Inertia scaled ~0.8x from the
# 32g default (same 65mm geometry, ~20% less mass). Arm (~32mm) already correct for a 65mm wheelbase.
whoop:
  mass: [0.026, 0.022, 0.030]
  J_xy: [1.9e-5, 1.6e-5, 2.2e-5]
  J_z:  [3.2e-5, 2.8e-5, 3.6e-5]

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0025
  optimizer: muon
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
