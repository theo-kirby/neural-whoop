# Hop-10 (Flywheel) — *** REFUTED experiment, retained as the reproducible RED recipe ***
# DR-on RELIABILITY hardening via a seam-DR CURRICULUM: identical to configs/gate_race.yaml (the
# [128,128]@120M baseline) except the seam DR magnitudes ramp 0->full over the first half of
# training (ppo.dr_curriculum_frac=0.5) instead of full-strength from step 0.
# RESULT (3 seeds, eval 2048x1500 seed 12345): the curriculum made DR-on reliability WORSE, not
# better — completion 0.804 -> 0.671, crash ~2.3x (4.6e-4 -> 1.06e-3), best_lap 2.665 -> 2.849s
# (DR-off also dipped). Hypothesis 'learn-task-first-then-harden' is REFUTED for this seam/budget:
# full-strength DR from step 0 (the baseline) is better. Flywheel node: see hop-10 (builds-on
# shrill-limit-5398, informed-by royal-firefly-3187). The dr_curriculum_frac knob stays in the
# codebase default-off (0.0); this file is the reproduction recipe only — do NOT use as a baseline.

run:
  name: gate_race_drcurric

task:
  name: gate_race
  n_gates: 5
  episode_len: 600
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001

env:
  n_envs: 4096
  seed: 0

# Seam-level domain randomization — same magnitudes as the baseline; the curriculum scales them.
dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

whoop: {}

ppo:
  total_steps: 120_000_000
  dr_curriculum_frac: 0.5    # ramp seam DR 0->full over the first 50% of training (hop-10 reliability curriculum)
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
