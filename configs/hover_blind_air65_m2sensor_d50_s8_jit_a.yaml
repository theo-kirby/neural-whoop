# hover_blind_air65_m2sensor_d50_s8_jit: M2-sensor at d50 amplitude with the MEASURED-LINK
# jittered latency model instead of the per-episode-constant hedge. The bench-measured ESP32
# bridge obs-age is p50 24 ms / p99 112 ms / max 209 ms at 50 Hz — mostly-fresh packets with
# occasional stale ones, NOT a constant 100 ms held for 30 s. Weights for ages 0..6 steps
# approximate those percentiles (p50 = 1 step, p99 = 5): APPROXIMATED FROM PERCENTILES,
# unvalidated until the full age histogram is measured on the deploy box.

run:
  name: hover_blind_air65_m2sensor_d50_s8_jit_a

task:
  name: hover_blind
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.0
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.8
  z_max: 2.2
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0

env:
  n_envs: 2048
  seed: 0
  obs_stack: 8
  append_prev_action: true

dr:
  enabled: true
  wind_accel_mps2: 0.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.0       # trim calibrated: the honesty split
  obs_noise_std: 0.0
  #                        [roll,  pitch, p,     q,    r    ]  (rad, rad/s)
  obs_noise_std_channels: [0.02,  0.02,  1.25,  1.1,   0.75]
  obs_bias_channels:      [0.0,   0.0,   0.05,  0.05, 0.05]
  action_latency_steps: 5
  action_latency_dist: [0.25, 0.45, 0.15, 0.07, 0.04, 0.03, 0.01]
  impulse_prob: 0.0
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]
