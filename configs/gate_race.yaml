# Baseline experiment: single-drone time-optimal gate racing on the RTX 5090.
# This is the "green" handoff config for the first autonomous agent. The agent is free to
# fork this (reward weights, curriculum, PPO hypers, course difficulty) — that's the point.

run:
  name: gate_race_baseline

task:
  name: gate_race
  n_gates: 5
  episode_len: 600        # steps; dt=0.02s -> 12s episodes, room for several laps
  v_ref: 4.0              # m/s reference cruise for the timing oracle (lap time to beat)
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05      # tuned up from 0.02 -> best_lap 3.87s->3.19s (beats oracle), completion 0.92->0.87
                          # flywheel node morning-base-2167 (e4a66478): time_penalty sweep; 0.10 regresses, 0.20 collapses
  smoothness_penalty: 0.001

env:
  n_envs: 4096            # parallel envs on the 5090 (raise toward VRAM limit to taste)
  seed: 0

# Seam-level domain randomization (airframe DR is always on inside the dynamics).
dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  # Detector noise off for the state-based baseline (first beachhead avoids the camera path).
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

# Airframe overrides (empty -> whoop-scale WhoopParams defaults: a ~32 g tiny-whoop).
whoop: {}

ppo:
  total_steps: 120_000_000  # hop-8 (cold-pond successor): 120M is the confirmed training-budget KNEE. multi-seed 2.715->2.600s
                            # (~4.2%) + tighter variance; 160/200M flat (no gain). Flywheel shrill-limit-5398. Budget lever now exhausted.
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]   # hop-6 (square-cake successor): capacity unlocked ~12% lap-time (3.29->2.91s); ~19k actor params, still MCU-deployable
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
