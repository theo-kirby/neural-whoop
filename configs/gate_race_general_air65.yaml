# Scale-generalist racing, re-centered for the real Air65 II + offboard deployment.
# Combines two GREEN levers: scale-randomization (gate_race_general / old-truth-3996, tight->giant
# generality) AND the sim2real re-center (gate_race_air65 / blue-unit-1398: Air65 II ~26g AUW +
# widened offboard action_latency 0-100ms). Goal: one policy that is BOTH scale-general AND robust
# to realistic offboard latency — a deployable studio-baseline-class racer. Seed 1 (the better
# generalist seed). Airframe numbers provisional; pinned at Stage 0 bench weigh-in.

run:
  name: gate_race_general_air65

task:
  name: gate_race
  n_gates: 5
  episode_len: 900
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001
  scale_randomize: true
  scale_radius_min: 4.5
  scale_radius_max: 12.0
  scale_step_ratio_min: 0.34
  scale_step_ratio_max: 0.62
  scale_z_max_min: 2.3
  scale_z_max_max: 3.5
  bound_xy: 14.0
  bound_z_min: 0.15
  bound_z_max: 5.0

env:
  n_envs: 4096
  seed: 1

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 5   # offboard camera-loop latency ~0-100ms (vs the generalist's 0-20ms)
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

# Air65 II airframe (~26g AUW), same override as gate_race_air65.yaml.
whoop:
  mass: [0.026, 0.022, 0.030]
  J_xy: [1.9e-5, 1.6e-5, 2.2e-5]
  J_z:  [3.2e-5, 2.8e-5, 3.6e-5]

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
