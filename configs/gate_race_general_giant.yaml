# Scale-generalist gate racing, FULL RANGE TO GIANT. Identical to gate_race_general except the
# per-episode arena radius now spans 4.5->18 m (was 4.5->12). Motivation (flywheel B1/B2): the flat
# generalist holds 0.91/0.85/0.71 tight/spread/big but only 0.57 on giant (18 m) — because giant was
# OUT of the 4.5->12 training range, so giant was pure extrapolation. Training the full eval range
# should turn giant in-distribution and lift it; the open question is whether spreading the
# distribution thinner costs tight/big. Crash bounds widened to fit radius-18 courses. Same
# [128,128]@120M net + DR; only the course-scale distribution + matching bounds change.

run:
  name: gate_race_general_giant

task:
  name: gate_race
  n_gates: 5
  episode_len: 900        # steps; dt=0.02 -> 18s, room for a lap or two even on giant courses
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001
  # Scale-randomization, full range tight -> GIANT. Crash bounds cover the largest scale (radius 18).
  scale_randomize: true
  scale_radius_min: 4.5
  scale_radius_max: 18.0
  scale_step_ratio_min: 0.34
  scale_step_ratio_max: 0.62
  scale_z_max_min: 2.3
  scale_z_max_max: 3.5
  bound_xy: 22.0
  bound_z_min: 0.15
  bound_z_max: 6.0

env:
  n_envs: 4096
  seed: 0

# Seam-level domain randomization (airframe DR is always on inside the dynamics).
dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

whoop: {}

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
