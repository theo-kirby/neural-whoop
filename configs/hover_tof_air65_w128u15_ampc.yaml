# hover_tof_air65_w128u15_ampc: AMP-CURRICULUM arm (user-chosen after the 3-arm w-ladder ended
# with no gate-dominant policy). The ladder swept a clean-trim <-> noise-robustness frontier:
# training the full 0.5-2.0x amplitude spread from step 0 forces the trunk to split capacity
# between nominal leveling and the tail. ONE factor vs hover_tof_air65_w128u15.yaml:
# dr.obs_noise_amp_curriculum: true — the amp band rides the existing dr_curriculum_frac 0.5
# ramp, interpolating (1,1) -> (0.5,2.0) over the first half of training, so the policy masters
# the nominal amplitude FIRST and hardens the tail late. Everything else identical
# ([128,128], upright_scale 1.5, same DR magnitudes, same 0.5-1.1 m band).

run:
  name: hover_tof_air65_w128u15_ampc

task:
  name: hover_tof
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.5
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.5
  z_max: 1.1
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0
  tof_rate_hz: 40.0
  tof_max_m: 1.3
  tof_tilt_limit_deg: 45.0

env:
  n_envs: 8192
  seed: 0
  obs_stack: 8

dr:
  enabled: true
  wind_accel_mps2: 1.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.05      # tight: deployment calibrates hover throttle on the bench
  obs_noise_std: 0.0           # superseded by the per-channel list below
  #                        [roll,  pitch, p,     q,    r,    h_err]  (rad, rad/s, m)
  obs_noise_std_channels: [0.02,  0.02,  1.25,  1.1,  0.75, 0.02]
  obs_noise_amp_range:    [0.5, 2.0]   # per-episode amplitude factor (see header)
  obs_noise_amp_curriculum: true       # band rides the curriculum: (1,1)->(0.5,2.0)
  obs_bias_channels:      [0.0,   0.0,   0.05,  0.05, 0.05, 0.03]
  action_latency_steps: 5
  impulse_prob: 0.02
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]

ppo:
  total_steps: 3_200_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  dr_curriculum_frac: 0.5
  ckpt_interval_updates: 800
