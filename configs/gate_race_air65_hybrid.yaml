# gate_race_air65_hybrid: O-3 onboard-hybrid split-latency profile (docs/ONBOARD_COMPUTE.md).
# Fork of gate_race_air65.yaml; ONLY the latency DR differs, re-shaped for ONBOARD execution:
#   - action_latency_steps 5 -> 1: the policy runs on the drone (companion MCU / FC), so the
#     act path is the local control loop again (~0-20 ms), not the offboard video pipeline.
#   - uplink_latency_steps 5 + uplink_interval_steps 2: the target channel (gate vector +
#     lookahead) still comes from offboard localization, uplinked at ~25-30 Hz with the same
#     ~0-100 ms pipeline delay; state obs (vel/att/rates) stay fresh from local sensors.
# Measures how much of the full-offboard latency tax (blue-unit-1398: 0.93 -> 0.79 completion)
# onboard execution buys back. Flywheel: child of sparkling-shadow-2507 / little-term-0124.
# gate_race re-centered for the real BetaFPV Air65 II + offboard deployment (sim2real).
# Fork of gate_race.yaml. Closes two gaps vs the 32 g default (docs/SIM2REAL.md, Flywheel blue-unit-1398):
#   (1) airframe re-centered to the Air65 II's real ALL-UP weight ~25-27 g (NOT the ~17 g dry spec);
#   (2) action_latency widened to the realistic offboard camera-loop range (~0-100 ms).
# Airframe numbers are provisional best-estimates; pin them by weighing the real drone at Stage 0.

run:
  name: gate_race_air65_hybrid

task:
  name: gate_race
  n_gates: 5
  episode_len: 600
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001

env:
  n_envs: 4096
  seed: 0

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1   # onboard actuation: local control loop (~0-20ms), not the offboard pipeline
  uplink_latency_steps: 5   # target-channel uplink: video->detect->uplink ~0-100ms at 50Hz
  uplink_interval_steps: 2  # ~25-30Hz uplink rate, zero-order-held between packets
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

# Air65 II airframe (~25-27g AUW = ~17g dry + 1S 300mAh ~8g + ~2g flow deck). Mass DR spans
# battery choice (260/300mAh) + flow-deck payload + build tolerance. Inertia scaled ~0.8x from the
# 32g default (same 65mm geometry, ~20% less mass). Arm (~32mm) already correct for a 65mm wheelbase.
whoop:
  mass: [0.026, 0.022, 0.030]
  J_xy: [1.9e-5, 1.6e-5, 2.2e-5]
  J_z:  [3.2e-5, 2.8e-5, 3.6e-5]

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
