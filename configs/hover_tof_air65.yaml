# hover_tof_air65: d50var_s8 (the flight-proven ★ studio-baseline) + the MEASURED-HEIGHT channel —
# the altitude lever. Every blind flight's ceiling was open-loop altitude (vz_est DC bias,
# docs/SIM2REAL.md); the bridge VL53L1X (2026-07-13) now measures height, so the policy observes
# height_err = setpoint_z - h_meas (deploy: target_height_m - tof·cosr·cosp, last-valid-held) and
# OWNS the altitude loop. ONE factor vs hover_blind_air65_d50var_s8.yaml: task hover_blind ->
# hover_tof (+ the 6th DR noise/bias channel and the setpoint band lowered into the sensor's
# short-mode valid band, 0.5-1.1 m; spawns still overshoot 1.3 m for saturation-recovery exposure).
# Sensor model in-task: ~40 Hz ZOH, 1.3 m saturation hold, 45° tilt hold. Height noise sd 0.02 m /
# bias ±0.03 m are DATASHEET-plausible placeholders (no ToF-equipped flight CSV yet) — amp range
# [0.5,2.0] spreads the sd to 0.01-0.04 m; recalibrate from the first measured flight.
# Frame = [roll,pitch,p,q,r, height_err] -> obs_dim 6*8 = 48.

run:
  name: hover_tof_air65

task:
  name: hover_tof
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.0
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.5
  z_max: 1.1
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0
  tof_rate_hz: 40.0
  tof_max_m: 1.3
  tof_tilt_limit_deg: 45.0

env:
  n_envs: 8192
  seed: 0
  obs_stack: 8

dr:
  enabled: true
  wind_accel_mps2: 1.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.05      # tight: deployment calibrates hover throttle on the bench
  obs_noise_std: 0.0           # superseded by the per-channel list below
  #                        [roll,  pitch, p,     q,    r,    h_err]  (rad, rad/s, m)
  obs_noise_std_channels: [0.02,  0.02,  1.25,  1.1,  0.75, 0.02]
  obs_noise_amp_range:    [0.5, 2.0]   # per-episode amplitude factor (see header)
  obs_bias_channels:      [0.0,   0.0,   0.05,  0.05, 0.05, 0.03]
  action_latency_steps: 5
  impulse_prob: 0.02
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]

ppo:
  total_steps: 3_200_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [64, 64]
  activation: tanh
  init_log_std: -0.5
  dr_curriculum_frac: 0.5
  ckpt_interval_updates: 800
