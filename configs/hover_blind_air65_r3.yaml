# hover_blind_air65_r3: spectrum-honest flagship candidate (H1) for the v2 post-mortem ladder.
# Fork of hover_blind_air65_r1.yaml changing EXACTLY ONE factor: the honest per-channel noise is
# AR(1)-COLORED instead of white (obs_noise_ar_channels below; same stds). R1 (white, trim
# poisons removed) still sank to 0% no-DR survival, refuting the trim-poison hypothesis (H3) --
# so the noise itself is the sink, and the remaining testable question is its SPECTRUM. The
# deployed gyro is Betaflight-LPF/notch-filtered (pilot.py gyroADCf): its noise is time-
# correlated, while the sim injected the measured amplitude as i.i.d. white noise -- right
# marginal, wrong spectrum, maximally hostile to thrust-gyro coupling. rho is a MODELED seam
# (no calm-hover flight logs on this box): 0.9 attitude / 0.8 gyro ~ tau 190/90 ms at 50 Hz --
# label any result unvalidated-rho until measured. R3 - R1 = the spectrum factor, one-factor.
# NOTE: the plan sketch said obs_stack 2 here; kept at 3 to preserve the single-factor delta.
run:
  name: hover_blind_air65_r3

task:
  name: hover_blind
  episode_len: 1500
  pos_sigma: 0.6
  pos_scale: 1.0
  dist_penalty: 0.2
  upright_scale: 1.0
  upright_sigma: 0.5
  vel_penalty: 0.05
  spin_penalty: 0.01
  alive_bonus: 0.1
  smoothness_penalty: 0.004
  crash_penalty: 10.0
  hold_radius: 0.35
  arena_radius: 3.5
  z_min: 0.8
  z_max: 2.2
  hold_fraction: 0.5
  spawn_offset: 1.0
  spawn_vel: 1.0
  spawn_tilt_deg: 30.0
  spawn_rate: 2.0

env:
  n_envs: 8192
  seed: 0
  obs_stack: 3

dr:
  enabled: true
  wind_accel_mps2: 1.0
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.05      # tight: deployment calibrates hover throttle on the bench
  obs_noise_std: 0.0           # superseded by the per-channel list below
  #                        [roll,  pitch, p,    q,    r   ]  (rad, rad/s)
  obs_noise_std_channels: [0.02,  0.02,  2.5,  2.2,  1.5]
  obs_noise_ar_channels:  [0.9,   0.9,   0.8,  0.8,  0.8]   # AR(1) rho -- MODELED, unvalidated
  obs_bias_channels:      [0.0,   0.0,   0.05, 0.05, 0.05]
  action_latency_steps: 5
  impulse_prob: 0.02
  impulse_vel_mps: 2.5
  impulse_rate_rps: 4.0

# Air65 II + XIAO companion, tightened to the weighed/spec ~30 g AUW band.
whoop:
  mass: [0.030, 0.028, 0.032]
  J_xy: [2.1e-5, 1.8e-5, 2.5e-5]
  J_z:  [3.5e-5, 3.0e-5, 4.0e-5]

ppo:
  total_steps: 3_200_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [64, 64]
  activation: tanh
  init_log_std: -0.5
  dr_curriculum_frac: 0.5
  ckpt_interval_updates: 800
