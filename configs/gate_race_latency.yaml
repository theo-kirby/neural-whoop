# Hop-12 (Flywheel) — *** NO-GO experiment, retained as the reproducible recipe ***
# DR-on RELIABILITY via a LATENCY-AWARE policy: baseline [128,128]@120M (full DR) plus frame stacking
# (env.obs_stack=3 -> the policy sees the last 3 obs frames, obs_dim 14->42) to compensate for the
# action-latency-1 seam.
# RESULT (3 seeds, eval 2048x1500 seed 12345, latency config): adding observation information did NOT
# lift the primary metric — DR-on completion 0.804 -> 0.790 (flat/slightly worse), and DR-off
# completion dipped 0.919 -> 0.890 (the 42-dim input is a harder learning problem); speed preserved.
# Fails the GREEN bar -> NOT promoted. With hop-10 (curriculum) and hop-11 (reward), THREE single-drone
# reliability levers are now exhausted; the ~0.80 DR-on gap is disturbance-magnitude-bound, not info-
# bound (velocity is already in obs-v4). Flywheel hop-12 node. obs_stack stays default 1 in the
# codebase; this file is the reproduction recipe only — do NOT use as a baseline.

run:
  name: gate_race_latency

task:
  name: gate_race
  n_gates: 5
  episode_len: 600
  v_ref: 4.0
  gate_radius: 0.45
  progress_scale: 1.0
  gate_bonus: 5.0
  lap_bonus: 20.0
  crash_penalty: 10.0
  time_penalty: 0.05
  smoothness_penalty: 0.001

env:
  n_envs: 4096
  seed: 0
  obs_stack: 3    # hop-12: latency-aware -> policy sees the last 3 frames (obs_dim 14->42)

dr:
  enabled: true
  wind_accel_mps2: 1.5
  rate_gain_frac: 0.15
  thrust_scale_frac: 0.10
  obs_noise_std: 0.01
  action_latency_steps: 1
  detector_bearing_deg: 0.0
  detector_dropout_prob: 0.0
  detector_fov_deg: 360.0

whoop: {}

ppo:
  total_steps: 120_000_000
  num_steps: 24
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [128, 128]
  activation: tanh
  init_log_std: -0.5
  ckpt_interval_updates: 100
